server:
  port: 8080

spring:
  application:
    name: smart-incident-monitoring

  datasource:
    url: jdbc:postgresql://localhost:5432/incident_db
    username: postgres
    password: 3123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: incident-monitoring-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.incidents.dto"

# JWT Configuration
jwt:
  secret: bXlTdXBlclNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uMjAyNlN0cm9uZ0tleQ==
  expiration: 86400000  # 24 hours in milliseconds

# Incident Detection Configuration
incident:
  detection:
    error-threshold: 10        # Number of errors to trigger an alert
    window-minutes: 5          # Time window in minutes

# Springdoc / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Kafka Topics
kafka:
  topics:
    log-ingestion: log-ingestion-topic
    alert-notification: alert-notification-topic

# Logging
logging:
  level:
    com.incidents: DEBUG
    org.springframework.security: WARN
    org.apache.kafka: WARN
